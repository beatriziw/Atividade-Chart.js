<head>

 <div class="linhas">

<script>
const labels = [
    '12:00',

];
const labels2 = [
    'Janeiro',
    'Fevereiro',
    'Março',
    'Abril',
    'Maio',
    'Junho',
];
const data = {
    labels: labels,
    datasets: [{
        label: 'Temperatura',

        data: [30, 29, 28, 25, 22, 23],
    },
    {

 ]
};
const data2 = {

 ]
};
const config = {

};

};
</script>
<script>
    const ChartLinhas = new Chart(

      const ChartBarras = new Chart(

</script>
